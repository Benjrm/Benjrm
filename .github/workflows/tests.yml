name: Testing pipeline
run-name: Testing for ${{ github.event_name }} by @${{ github.actor }}


on:
  push:
    branches:
      - main
      - 'feature/*'
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/*.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/*.yml'
  workflow_dispatch:

# Cancel concurrent running workflows, after a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Check which files have changed to avoid unnecessary tests
  check_changes:
    name: "Detect changed Files"
    runs-on: ubuntu-latest
    # Skip pull_request event for internal PRs (push covers it)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # Build Frontend
  build_frontend:
    uses: ./.github/workflows/build_frontend.yml

  # Backend Tests
  backend_tests:
    name: "Backend Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: [check_changes, build_frontend]
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || needs.check_changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
      - name: Test (debug)
        run: cargo test --all-features
        working-directory: backend
      - name: Restore frontend build
        uses: actions/cache/restore@v4
        with:
          path: frontend/dist
          key: ${{ runner.os }}-frontend-build-${{ hashFiles('frontend/src/**', 'frontend/package-lock.json', 'frontend/vite.config.ts', 'frontend/tsconfig.json') }}
          fail-on-cache-miss: true
      - name: Test (release)
        run: cargo test --all-features --release
        working-directory: backend