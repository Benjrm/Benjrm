name: API Testing with Schemathesis
on:
  push:
    branches:
      - main
    paths:
      - 'docs/openapispec/**'
      - 'backend/**'
      - '.github/workflows/schemathesis.yaml'
  pull_request:
    paths:
      - 'docs/openapispec/**'
      - 'backend/**'
      - '.github/workflows/schemathesis.yaml'
  workflow_dispatch:

jobs:
  test:
    permissions:
      # Because the action needs to comment on the PR with the coverage summary powered
      # by [TraceCov](https://docs.tracecov.sh/) we need to give it write permissions to pull requests.
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Start API
        run: |
          cargo run --manifest-path backend/Cargo.toml &
          for i in $(seq 1 120); do
            if curl -s --show-error --fail http://localhost:8080 > /dev/null; then
              echo "API is ready!"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "API did not become ready within 120 seconds" >&2
              exit 1
            fi
            sleep 1
          done
        env:
          DATABASE_URL: 'sqlite::memory:'
          PORT: '8080'
      - uses: schemathesis/action@v3
        with:
          schema: 'docs/openapispec/RestInterface.yaml'
          base-url: 'http://localhost:8080'
